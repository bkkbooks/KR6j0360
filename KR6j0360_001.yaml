body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時佛告慈氏菩薩言汝當諦聽有陀羅尼具大威神最上功德能令衆生解脫惡趣轉身當得受勝妙樂時慈氏菩薩白言世尊願為宣説爾時世尊即説陀羅尼曰那謨引婆誐嚩帝引一舍引吉也二合母那曳引二怛他引誐多引野三阿囉曷二合帝引三藐訖三二合沒馱引野四怛𭔞他引五阿𡁠帝引六阿𡁠當惹曳引七婆囉婆囉八味怛囉二合嚩路吉帝引九哥囉哥囉十摩賀三摩野悉帝引十一婆囉婆囉十二地曼拏微𡁠引十三三摩二合囉三摩二合囉十四阿娑摩二合引剛三摩煬十五地地十六摩賀引地娑嚩二合引賀引十七爾時慈氏菩薩聞佛世尊説陀羅尼已白言世尊是陀羅尼有大利益能令衆生解脫惡趣時慈氏菩薩復發願言若有衆生於未來世末法之時能讀誦受持者設以宿業墮阿鼻獄者我成佛時當以佛力救拔出之復與授於阿耨多羅三藐三菩提記時慈氏菩薩説是語已禮佛雙足歡喜而退
